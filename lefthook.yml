min_version: 1.12.2

output:
  - summary
  - failure
  - execution_out

pre-commit:
  commands:
    pint:
      glob: "*.php"
      root: "src/"
      stage_fixed: true
      run: 'if command -v herd &>/dev/null; then herd php ./vendor/bin/pint {staged_files}; else ./vendor/bin/pint {staged_files}; fi'

pre-push:
  parallel: true
  commands:
    phpstan:
      root: "src/"
      run: 'if command -v herd &>/dev/null; then herd php vendor/bin/phpstan analyse --memory-limit=512M; else composer test:types; fi'
    php-cli-skill-validate:
      run: 'php-cli-skill-validate livewire-docs'
